<!DOCTYPE html>
<html>
<head>
  <title>Chat2Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      background: #334155;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="app">
  <h1>📅 Chat2Calendar</h1>
  <p>Turn your message into a calendar event instantly</p>

  <input type="text" id="msg" placeholder="e.g. Call with client at 4pm" />
  <button onclick="send()">Create Event</button>

  <div id="status" class="status"></div>
</div>

<script>
async function send() {
  const message = document.getElementById("msg").value;
  const status = document.getElementById("status");

  if (!message) {
    status.style.color = "orange";
    status.innerText = "⚠️ Please enter a message";
    return;
  }

  status.style.color = "white";
  status.innerText = "⏳ Processing...";

  try {
    const res = await fetch("https://geethal.app.n8n.cloud/webhook/whatsapp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        body: {
          Body: message
        }
      })
    });

    if (res.ok) {
      status.style.color = "#22c55e";
      status.innerText = "✅ Event added to calendar!";
    } else {
      status.style.color = "red";
      status.innerText = "❌ Failed to create event";
    }

  } catch (err) {
    status.style.color = "red";
    status.innerText = "❌ Error occurred";
  }
}
</script>

</body>
</html>
